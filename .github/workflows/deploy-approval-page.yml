name: Deploy approval page

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/deploy-approval-page.yml
      - setup/security/approval-page.html
      - setup/security/approval-qr.html
      - setup/security/approval-sw.js
      - setup/security/manifest.webmanifest
      - setup/security/approval-icon.svg

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: approval-page
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static approval site
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path public | Out-Null
          Copy-Item 'setup/security/approval-page.html' 'public/index.html' -Force
          Copy-Item 'setup/security/approval-qr.html' 'public/approval-qr.html' -Force
          Copy-Item 'setup/security/approval-sw.js' 'public/approval-sw.js' -Force
          Copy-Item 'setup/security/manifest.webmanifest' 'public/manifest.webmanifest' -Force
          Copy-Item 'setup/security/approval-icon.svg' 'public/approval-icon.svg' -Force

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
