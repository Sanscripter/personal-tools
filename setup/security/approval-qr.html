<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone approval handoff</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09111d;
      --panel: #131c2f;
      --text: #eef4ff;
      --muted: #9db0d0;
      --accent: #6ea8fe;
      --ok: #63e6be;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #09111d, #0b1220);
      font-family: Segoe UI, Arial, sans-serif;
      color: var(--text);
    }
    .card {
      width: min(560px, calc(100% - 32px));
      background: var(--panel);
      border: 1px solid #24324d;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
      text-align: center;
    }
    p { color: var(--muted); }
    #qr {
      display: inline-block;
      background: white;
      padding: 12px;
      border-radius: 12px;
      margin: 12px 0;
      min-width: 280px;
      min-height: 280px;
    }
    .actions { margin-top: 12px; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      margin: 6px 8px 0 0;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #04111f;
    }
    .secondary { background: #2f4368; color: var(--text); }
    .mono { font-family: Consolas, monospace; word-break: break-word; }
    .ok { color: var(--ok); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Approve from your phone</h1>
    <p id="subtitle">Scan this QR code with your phone to open the live approval page.</p>
    <div id="qr"></div>
    <div id="status" class="mono"></div>
    <p id="urlText" class="mono"></p>
    <div class="actions">
      <button id="copyBtn" type="button">Copy link</button>
      <button id="openBtn" type="button" class="secondary">Open here</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search)
    const requestId = params.get('request') || ''
    const requestSecret = params.get('secret') || ''
    const pageBase = params.get('page') || 'https://sanscripter.github.io/personal-tools/'
    const action = params.get('action') || 'approval'
    const statusEl = document.getElementById('status')
    const urlTextEl = document.getElementById('urlText')

    const approvalUrl = params.get('url') || (
      requestId && requestSecret
        ? pageBase + (pageBase.includes('?') ? '&' : '?') + new URLSearchParams({ request: requestId, secret: requestSecret }).toString()
        : ''
    )

    document.getElementById('subtitle').textContent = 'Scan this QR code with your phone to approve: ' + action

    if (!approvalUrl) {
      statusEl.textContent = 'No approval link was provided.'
    } else {
      urlTextEl.textContent = approvalUrl
      QRCode.toCanvas(approvalUrl, { width: 280, margin: 1 }, (error, canvas) => {
        if (error) {
          statusEl.textContent = 'The QR code could not be generated.'
          return
        }
        const qrEl = document.getElementById('qr')
        qrEl.innerHTML = ''
        qrEl.appendChild(canvas)
        statusEl.textContent = 'Ready. Your phone can scan this now.'
        statusEl.className = 'mono ok'
      })
    }

    document.getElementById('copyBtn').addEventListener('click', async () => {
      if (!approvalUrl) return
      try {
        await navigator.clipboard.writeText(approvalUrl)
        statusEl.textContent = 'Link copied.'
        statusEl.className = 'mono ok'
      } catch {
        statusEl.textContent = 'Clipboard copy is not available in this browser.'
        statusEl.className = 'mono'
      }
    })

    document.getElementById('openBtn').addEventListener('click', () => {
      if (approvalUrl) {
        window.open(approvalUrl, '_blank', 'noopener,noreferrer')
      }
    })
  </script>
</body>
</html>
